<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NEXUS — Agente Pessoal</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#00e5ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEXUS">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="google" content="notranslate">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--bg1:#0d1d38;--bg2:#102244;--bg3:#162b52;
  --brd:rgba(0,229,255,.13);--brd2:rgba(0,229,255,.06);
  --cy:#00e5ff;--cg:rgba(0,229,255,.25);
  --gn:#00e676;--am:#ffca28;--rd:#ff5252;--pu:#7c83ff;
  --tx:#eaf2ff;--tx2:#7eaad4;--tx3:#3d6492;
  --FD:'Syne',sans-serif;--FB:'DM Sans',sans-serif;--FM:'JetBrains Mono',monospace;
  --r:14px;--rs:8px;--T:.18s ease
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--FB)}
.nebula{position:fixed;inset:0;pointer-events:none;z-index:0}
.nebula::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 15%,rgba(0,80,180,.2) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(0,40,110,.14) 0%,transparent 55%)}
.nebula::after{content:'';position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 8% 12%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 70% 55%,rgba(0,229,255,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 35% 45%,rgba(0,229,255,.35) 0%,transparent 100%),radial-gradient(1px 1px at 80% 20%,rgba(255,255,255,.28) 0%,transparent 100%),radial-gradient(1px 1px at 45% 78%,rgba(255,255,255,.2) 0%,transparent 100%),radial-gradient(2px 2px at 14% 82%,rgba(0,229,255,.25) 0%,transparent 100%),radial-gradient(1px 1px at 92% 60%,rgba(255,255,255,.2) 0%,transparent 100%)}
.scan{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,.015) 3px,rgba(0,0,0,.015) 4px)}
.app{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOASTS */
.toast-stack{position:absolute;top:0;left:0;right:0;z-index:200;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:8px}
.toast{display:inline-flex;align-items:center;gap:9px;background:rgba(10,22,40,.97);border:1px solid rgba(0,229,255,.3);border-radius:30px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--tx);backdrop-filter:blur(20px);animation:tin .3s ease;white-space:nowrap;max-width:92%;overflow:hidden;text-overflow:ellipsis}
@keyframes tin{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-d{width:6px;height:6px;border-radius:50%;background:var(--cy);box-shadow:0 0 7px var(--cy);flex-shrink:0}

/* HEADER */
.hdr{flex-shrink:0;z-index:10;background:rgba(10,22,40,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--brd2);padding:0 20px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:13px 0 11px;border-bottom:1px solid var(--brd2)}
.brand{display:flex;align-items:center;gap:10px}
.orb{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(0,229,255,.4);position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.orb::before{content:'';position:absolute;inset:0;border-radius:50%;animation:orbsp 9s linear infinite;border:1.5px solid rgba(0,229,255,.4)}
.orb-c{width:8px;height:8px;border-radius:50%;background:var(--cy);box-shadow:0 0 10px var(--cy);z-index:1;animation:orbp 2.5s ease-in-out infinite}
@keyframes orbsp{to{transform:rotate(360deg)}}
@keyframes orbp{0%,100%{opacity:.5;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.brand-name{font-family:var(--FD);font-size:20px;font-weight:800;letter-spacing:5px;text-transform:uppercase;color:var(--tx)}
.brand-name em{color:var(--cy);font-style:normal;text-shadow:0 0 12px var(--cg)}
.st-pill{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--gn);font-family:var(--FM);letter-spacing:1.5px;text-transform:uppercase;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:20px;padding:3px 11px}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--gn);box-shadow:0 0 6px var(--gn);animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hdr-r{display:flex;gap:5px}
.hbtn{width:30px;height:30px;border-radius:7px;background:transparent;border:1px solid var(--brd2);color:var(--tx3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all var(--T);font-family:var(--FM)}
.hbtn:hover,.hbtn.on{color:var(--cy);background:rgba(0,229,255,.1);border-color:var(--brd)}

/* HUD — collapsible panel */
.hud-toggle-row{display:flex;align-items:center;justify-content:center;padding:3px 0 2px;border-top:1px solid var(--brd2);cursor:pointer;transition:background var(--T);position:relative}
.hud-toggle-row:hover{background:rgba(0,229,255,.04)}
.hud-chevron{font-size:11px;color:var(--tx3);transition:transform .28s ease,color var(--T);font-family:var(--FM)}
.hud-toggle-row:hover .hud-chevron{color:var(--cy)}
.hud-badge{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:var(--rd);color:#fff;font-size:9px;font-family:var(--FM);font-weight:700;border-radius:20px;padding:1px 6px;line-height:1.4;display:none}
.hud-badge.show{display:block}
.hud-panel{overflow:hidden;max-height:0;transition:max-height .32s cubic-bezier(.4,0,.2,1),opacity .25s ease;opacity:0}
.hud-panel.open{max-height:260px;opacity:1}
.hud-grid{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px 14px}
.hud-card{flex:1;min-width:calc(50% - 4px);background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:11px 13px;cursor:pointer;transition:border-color var(--T),background var(--T);position:relative;overflow:hidden}
.hud-card:hover{border-color:var(--brd);background:var(--bg3)}
.hud-card.warn{border-color:rgba(255,82,82,.25);background:rgba(255,82,82,.05)}
.hud-card.warn:hover{border-color:rgba(255,82,82,.4)}
.hud-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.hud-card-lbl{font-size:9.5px;color:var(--tx3);font-family:var(--FM);letter-spacing:1.2px;text-transform:uppercase}
.hud-card-icon{font-size:13px;opacity:.7}
.hud-card-val{font-family:var(--FM);font-size:20px;font-weight:700;color:var(--cy);line-height:1;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hud-card-val.warn{color:var(--rd)}
.hud-card-val.blur{filter:blur(5px);user-select:none}
.hud-mini-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.hud-mini-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--pu));transition:width .6s ease}
.hud-mini-fill.g{background:linear-gradient(90deg,var(--gn),var(--cy))}
.hud-mini-fill.w{background:linear-gradient(90deg,var(--am),var(--rd))}
.hud-highlight{margin:0 16px 12px;padding:10px 13px;background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.18);border-radius:var(--rs);font-size:12.5px;color:var(--tx2);display:flex;align-items:center;gap:9px}
.hud-highlight.crit{background:rgba(255,82,82,.06);border-color:rgba(255,82,82,.2);color:var(--rd)}
.hud-highlight-dot{width:6px;height:6px;border-radius:50%;background:var(--cy);box-shadow:0 0 6px var(--cy);flex-shrink:0}
.hud-highlight.crit .hud-highlight-dot{background:var(--rd);box-shadow:0 0 6px var(--rd)}
.hud-customize{display:flex;align-items:center;justify-content:flex-end;padding:0 16px 10px;gap:6px}
.hud-cust-btn{font-size:10px;color:var(--tx3);font-family:var(--FM);background:none;border:1px solid var(--brd2);border-radius:20px;padding:3px 10px;cursor:pointer;transition:all var(--T)}
.hud-cust-btn:hover{color:var(--cy);border-color:var(--brd);background:rgba(0,229,255,.06)}

/* ALERT BAR */
.alert-bar{display:none;align-items:center;gap:8px;padding:8px 20px;flex-shrink:0;cursor:pointer;background:rgba(255,202,40,.05);border-bottom:1px solid rgba(255,202,40,.14);font-size:12px;color:var(--am);font-family:var(--FM);transition:background var(--T);overflow:hidden}
.alert-bar:hover{background:rgba(255,202,40,.09)}
.alert-bar.show{display:flex}
.adot{width:5px;height:5px;border-radius:50%;background:var(--am);box-shadow:0 0 6px var(--am);flex-shrink:0}

/* MAIN */
.main{flex:1;overflow:hidden;position:relative}

/* CHAT */
.chat-view{position:absolute;inset:0;display:flex;flex-direction:column;padding-bottom:58px}
.msgs{flex:1;overflow-y:auto;padding:18px 20px 8px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.msg-g{display:flex;flex-direction:column;animation:mgin .2s ease}
@keyframes mgin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-g.user{align-items:flex-end}
.msg-g.nexus{align-items:flex-start}
.sender{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.av{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(0,180,255,.1));border:1px solid rgba(0,229,255,.28);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--cy);font-family:var(--FD)}
.sn{font-size:10px;color:var(--tx3);font-family:var(--FM);letter-spacing:.8px;text-transform:uppercase}
.st2{font-size:10px;color:var(--tx3);font-family:var(--FM)}
.bbl{max-width:min(88%,640px);border-radius:14px;font-size:14px;line-height:1.65;padding:12px 16px;word-break:break-word}
.bbl.user{background:linear-gradient(135deg,#112044,#173262);border:1px solid rgba(0,229,255,.2);border-radius:14px 14px 3px 14px}
.bbl.nexus{background:var(--bg1);border:1px solid var(--brd);border-radius:3px 14px 14px 14px}
.bbl.act{background:rgba(0,230,118,.05);border-color:rgba(0,230,118,.2)}
.bbl.clr{background:rgba(255,202,40,.05);border-color:rgba(255,202,40,.2)}
.bbl strong{color:var(--cy);font-weight:600}
.bbl.act strong{color:var(--gn)}
.bbl.clr strong{color:var(--am)}
.bbl code{font-family:var(--FM);font-size:12px;background:rgba(0,229,255,.08);padding:1px 6px;border-radius:4px;color:var(--cy);border:1px solid rgba(0,229,255,.12)}
.bbl ul{list-style:none;margin:6px 0;display:flex;flex-direction:column;gap:4px}
.bbl ul li{font-size:13.5px;display:flex;gap:8px}
.bbl ul li::before{content:'›';color:var(--cy);flex-shrink:0;font-weight:700}
.bbl.act ul li::before{color:var(--gn)}
.utm{font-size:10px;color:var(--tx3);font-family:var(--FM);margin-top:3px}
.typing{display:flex;gap:5px;align-items:center;padding:12px 16px}
.td{width:6px;height:6px;border-radius:50%;background:var(--cy);opacity:.3;animation:tdot 1.3s ease-in-out infinite}
.td:nth-child(2){animation-delay:.18s}.td:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{opacity:.2;transform:scale(.7)}30%{opacity:1;transform:scale(1)}}
.act-log{margin-top:9px;padding:9px 11px;background:rgba(0,230,118,.07);border:1px solid rgba(0,230,118,.18);border-radius:8px}
.act-log-t{font-size:9.5px;font-family:var(--FM);font-weight:700;color:var(--gn);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.act-log li{list-style:none;font-size:12.5px;color:var(--tx2);padding:2px 0;display:flex;gap:7px}
.act-log li::before{content:'✔';color:var(--gn);font-size:10px;margin-top:2px;flex-shrink:0}

/* DATA CARD */
.dc{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-top:7px;max-width:min(100%,520px)}
.dc-hd{padding:10px 16px;background:linear-gradient(90deg,rgba(0,229,255,.08),transparent);border-bottom:1px solid var(--brd2);font-size:10px;font-weight:700;color:var(--cy);font-family:var(--FM);letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.dc-dot{width:5px;height:5px;border-radius:50%;background:var(--cy);box-shadow:0 0 6px var(--cy)}
.dc-stats{display:flex;border-bottom:1px solid var(--brd2)}
.dc-st{flex:1;padding:13px 10px;text-align:center;border-right:1px solid var(--brd2)}
.dc-st:last-child{border-right:none}
.dc-v{font-family:var(--FM);font-size:18px;font-weight:600;color:var(--tx);line-height:1;margin-bottom:4px}
.dc-v.hi{color:var(--cy)}.dc-v.ok{color:var(--gn)}.dc-v.wn{color:var(--am)}
.dc-l{font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;font-family:var(--FM)}
.dc-rows{padding:12px 16px;display:flex;flex-direction:column;gap:9px}
.dc-row{display:flex;flex-direction:column;gap:5px}
.dc-rh{display:flex;justify-content:space-between}
.dc-rl{font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:74%}
.dc-rp{font-size:12px;font-family:var(--FM);font-weight:600;color:var(--tx)}
.dc-pb{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.dc-pf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cy),var(--pu));transition:width .8s ease}
.dc-pf.g{background:linear-gradient(90deg,var(--gn),var(--cy))}
.dc-pf.w{background:linear-gradient(90deg,var(--am),var(--rd))}

/* SLASH PAL */
.slash-pal{background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:0 -8px 28px rgba(0,0,0,.5)}
.scmd{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--brd2);transition:background var(--T)}
.scmd:last-child{border-bottom:none}
.scmd:hover{background:rgba(0,229,255,.06)}
.scmd-k{font-family:var(--FM);font-size:12.5px;color:var(--cy);min-width:110px;font-weight:600}
.scmd-d{font-size:12px;color:var(--tx3)}

/* CHAT FOOTER */
.chat-ft{padding:10px 20px 14px;border-top:1px solid var(--brd2);background:rgba(10,22,40,.88);backdrop-filter:blur(20px);flex-shrink:0}
.hints{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.hint{font-size:11px;color:var(--tx3);font-family:var(--FM);background:var(--bg2);border:1px solid var(--brd2);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all var(--T);white-space:nowrap}
.hint:hover{color:var(--cy);border-color:var(--brd);background:rgba(0,229,255,.07)}
.irow{display:flex;gap:8px;align-items:flex-end}
.ni{flex:1;background:var(--bg2);border:1px solid var(--brd);border-radius:24px;padding:11px 18px;font-size:14px;color:var(--tx);font-family:var(--FB);outline:none;resize:none;max-height:100px;overflow-y:auto;scrollbar-width:none;line-height:1.5;transition:border-color var(--T),box-shadow var(--T)}
.ni:focus{border-color:rgba(0,229,255,.4);box-shadow:0 0 0 3px rgba(0,229,255,.06)}
.ni::placeholder{color:var(--tx3);font-size:13px}
.sbtn{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(0,180,255,.12));border:1px solid rgba(0,229,255,.38);color:var(--cy);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--T);box-shadow:0 0 18px rgba(0,229,255,.15)}
.sbtn:hover{transform:scale(1.07);box-shadow:0 0 26px rgba(0,229,255,.28)}
.sbtn:disabled{opacity:.2;cursor:not-allowed;transform:none;box-shadow:none}

/* PANELS */
.panel{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:5;animation:psl .22s ease}
@keyframes psl{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.phdr{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--brd2);flex-shrink:0;background:rgba(10,22,40,.92);backdrop-filter:blur(18px)}
.pback{width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--brd2);color:var(--tx2);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--T)}
.pback:hover{color:var(--cy);background:rgba(0,229,255,.08);border-color:var(--brd)}
.pt{font-family:var(--FD);font-size:14px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx)}
.pbody{flex:1;overflow-y:auto;overflow-x:hidden;padding:18px 20px 84px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* NAV */
.bnav{position:absolute;bottom:0;left:0;right:0;display:flex;padding:7px 6px 12px;background:rgba(8,17,34,.97);backdrop-filter:blur(24px);border-top:1px solid var(--brd2);z-index:20}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:5px 2px;border-radius:8px;color:var(--tx3);font-family:var(--FM);transition:all var(--T)}
.nbtn:hover{color:var(--tx2)}
.nbtn.on{color:var(--cy)}
.nbtn.on .ni2{filter:drop-shadow(0 0 6px rgba(0,229,255,.7));transform:scale(1.18)}
.ni2{font-size:16px;transition:all var(--T)}
.nl{font-size:8.5px;letter-spacing:.7px;text-transform:uppercase}

/* FOCUS */
.focus .hdr,.focus .alert-bar,.focus .bnav{display:none!important}
.fexit{position:absolute;top:10px;right:12px;z-index:100;background:rgba(10,22,40,.9);border:1px solid var(--brd);border-radius:8px;padding:5px 14px;color:var(--tx3);font-size:10px;font-family:var(--FM);cursor:pointer;backdrop-filter:blur(10px);letter-spacing:1px;transition:all var(--T)}
.fexit:hover{color:var(--cy)}

/* SHARED */
.slbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.8px;text-transform:uppercase;font-family:var(--FM);margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--brd2)}
.card{background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:10px;overflow:hidden;transition:border-color var(--T)}
.card:hover{border-color:rgba(0,229,255,.2)}
.hero{background:linear-gradient(145deg,var(--bg2),var(--bg1));border:1px solid var(--brd);border-radius:var(--r);padding:20px;margin-bottom:13px;overflow:hidden;position:relative}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.08),transparent);pointer-events:none}
.pbar{background:var(--bg3);border-radius:20px;height:5px;overflow:hidden}
.pfill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--cy),var(--pu));transition:width .7s ease}
.pfill.g{background:linear-gradient(90deg,var(--gn),var(--cy))}
.pfill.w{background:linear-gradient(90deg,var(--am),var(--rd))}
.btn{background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.25);border-radius:var(--rs);padding:8px 16px;color:var(--cy);font-size:13px;font-weight:500;font-family:var(--FB);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all var(--T);white-space:nowrap}
.btn:hover{background:rgba(0,229,255,.18);transform:translateY(-1px)}
.btn.sm{padding:6px 12px;font-size:12px}
.btn.ghost{background:transparent;border-color:var(--brd2);color:var(--tx2)}
.btn.ghost:hover{background:var(--bg2);color:var(--tx);border-color:var(--brd);transform:none}
.btn.full{width:100%;justify-content:center}
.btn.danger{background:rgba(255,82,82,.07);border-color:rgba(255,82,82,.2);color:var(--rd)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.inp,.sel{width:100%;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--tx);font-family:var(--FB);outline:none;transition:border-color var(--T)}

.inp::placeholder{color:var(--tx3)}
.sel option{background:var(--bg2)}
.badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;font-family:var(--FM);flex-shrink:0}
.bh{background:rgba(255,82,82,.12);color:var(--rd)}.bm{background:rgba(255,202,40,.1);color:var(--am)}.bl{background:rgba(0,230,118,.1);color:var(--gn)}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.mc{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:12px}
.mcv{font-family:var(--FM);font-size:18px;font-weight:600;line-height:1}
.mck{font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;font-family:var(--FM);margin-top:3px}
.fbal{text-align:center;padding:6px 0 16px}
.famt{font-family:var(--FD);font-size:36px;font-weight:700;color:var(--tx);line-height:1}
.fsl{font-size:10px;color:var(--tx3);font-family:var(--FM);letter-spacing:2px;margin-top:5px}
.txrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd2);overflow:hidden}
.txrow:last-child{border-bottom:none}
.txic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.txin{flex:1;overflow:hidden}
.txn{font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.txd{font-size:11px;color:var(--tx3);font-family:var(--FM);margin-top:2px}
.txv{font-size:14px;font-weight:700;font-family:var(--FM);flex-shrink:0}
.txv.inc{color:var(--gn)}.txv.exp{color:var(--rd)}
.aerr{background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.18);border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:var(--rd);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.tr{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--brd2);cursor:pointer;transition:all var(--T)}
.tr:last-child{border-bottom:none}
.tr:hover{padding-left:5px}
.tr.dn{opacity:.42}
.chk{width:19px;height:19px;border-radius:5px;flex-shrink:0;border:1.5px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;transition:all var(--T)}
.chk.on{background:rgba(0,229,255,.15);border-color:var(--cy);color:var(--cy)}
.ttx{flex:1;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr.dn .ttx{text-decoration:line-through;color:var(--tx3)}
.gc{background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:10px;overflow:hidden;transition:border-color var(--T)}
.gc:hover{border-color:rgba(0,229,255,.2)}
.gn2{font-size:14px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gm{font-size:11px;color:var(--tx3);font-family:var(--FM);margin-bottom:10px}
.gp{font-size:18px;font-weight:700;color:var(--cy);font-family:var(--FM);white-space:nowrap}
.st3{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--brd2);cursor:pointer}
.st3:last-child{border-bottom:none}
.stx{font-size:13px;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stx.dn{text-decoration:line-through;color:var(--tx3)}
.exp-btn{font-size:11px;color:var(--cy);background:none;border:none;cursor:pointer;font-family:var(--FM);margin-top:8px;letter-spacing:.4px}
.empty{text-align:center;padding:32px;color:var(--tx3)}
.ei{font-size:28px;margin-bottom:8px;opacity:.3}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-mo{font-family:var(--FD);font-size:15px;font-weight:700;color:var(--tx);letter-spacing:2px;text-transform:uppercase}
.cal-arr{width:28px;height:28px;border-radius:7px;background:var(--bg2);border:1px solid var(--brd2);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--T)}
.cal-arr:hover{color:var(--cy);background:rgba(0,229,255,.08);border-color:var(--brd)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.cal-dow-c{text-align:center;font-size:9px;font-family:var(--FM);color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-d{min-height:44px;border-radius:9px;padding:5px 4px 3px;cursor:pointer;transition:all var(--T);display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid transparent}
.cal-d:hover{background:rgba(0,229,255,.07);border-color:var(--brd2)}
.cal-d.oth{opacity:.25}
.cal-d.tod{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.28)}
.cal-d.sel{background:rgba(0,229,255,.16);border-color:rgba(0,229,255,.44)}
.cal-dn{font-size:12px;font-family:var(--FM);font-weight:500;color:var(--tx2);line-height:1}
.cal-d.tod .cal-dn,.cal-d.sel .cal-dn{color:var(--cy);font-weight:700}
.td2{width:5px;height:5px;border-radius:50%;background:var(--cy);box-shadow:0 0 7px var(--cy);animation:orbp 2s ease-in-out infinite}
.ev-dots{display:flex;gap:2px;justify-content:center;max-width:28px}
.ev-d{width:4px;height:4px;border-radius:50%}
.ew{background:var(--cy)}.ep{background:var(--pu)}.eh{background:var(--gn)}.eo{background:var(--am)}
.day-det{background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-top:12px}
.day-det-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.day-det-t{font-family:var(--FM);font-size:11px;font-weight:700;color:var(--cy);letter-spacing:1.5px;text-transform:uppercase}
.ev-item{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg1);border:1px solid var(--brd2);border-radius:9px;margin-bottom:7px;transition:all var(--T)}
.ev-item:last-child{margin-bottom:0}
.ev-item:hover{border-color:var(--brd)}
.ev-bar{width:3px;height:28px;border-radius:2px;flex-shrink:0}
.ev-info{flex:1;overflow:hidden}
.ev-tt{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-mt{font-size:11px;color:var(--tx3);font-family:var(--FM);margin-top:2px}
.ev-bg{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:var(--FM);border:1px solid;flex-shrink:0}
.rec-b{font-size:9px;font-family:var(--FM);color:var(--tx3);background:var(--bg3);border:1px solid var(--brd2);border-radius:20px;padding:2px 7px;margin-left:5px}

/* ROUTINE */
.rsum{display:flex;gap:7px;margin-bottom:13px}
.rsmc{flex:1;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:11px;text-align:center}
.rsmv{font-family:var(--FM);font-size:18px;font-weight:700;line-height:1;margin-bottom:3px}
.rsml{font-size:9.5px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;font-family:var(--FM)}
.dnote{background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:11px 13px;font-size:13.5px;color:var(--tx);font-family:var(--FB);width:100%;resize:none;outline:none;transition:border-color var(--T);margin-bottom:14px;min-height:64px;line-height:1.55}
.dnote:focus{border-color:rgba(0,229,255,.28)}
.dnote::placeholder{color:var(--tx3)}
.tl-gl{display:flex;align-items:center;gap:8px;margin:12px 0 7px;font-size:9.5px;font-family:var(--FM);font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase}
.tl-gl::after{content:'';flex:1;height:1px;background:var(--brd2)}
.tl-i{display:flex;gap:12px;padding:0 0 10px}
.tl-ln{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:18px}
.tl-d{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;cursor:pointer;transition:all var(--T);border:1.5px solid}
.tl-d.hb{border-color:var(--am);color:var(--am);background:rgba(255,202,40,.08)}
.tl-d.hb.dn{background:var(--am);color:var(--bg);border-color:var(--am)}
.tl-d.tk{border-color:var(--cy);color:var(--cy);background:rgba(0,229,255,.06)}
.tl-d.tk.dn{background:var(--cy);color:var(--bg);border-color:var(--cy)}
.tl-d.ev{border-color:var(--pu);color:var(--pu);background:rgba(124,131,255,.08);cursor:default}
.tl-con{flex:1;width:1px;background:var(--brd2);margin:2px 0}
.tl-b{flex:1;padding-top:1px;overflow:hidden;padding-bottom:3px}
.tl-tm{font-size:10px;font-family:var(--FM);color:var(--tx3);margin-bottom:2px}
.tl-tt{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-tt.dn{text-decoration:line-through;color:var(--tx3)}
.tl-sb{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.sk-tag{font-size:10px;font-family:var(--FM);color:var(--am);background:rgba(255,202,40,.08);border:1px solid rgba(255,202,40,.16);border-radius:20px;padding:2px 8px}
.ev-lk{font-size:10px;font-family:var(--FM);color:var(--pu);background:rgba(124,131,255,.07);border:1px solid rgba(124,131,255,.18);border-radius:20px;padding:2px 8px;cursor:pointer;transition:all var(--T)}
.ev-lk:hover{background:rgba(124,131,255,.16)}
.cat-tag{font-size:10px;font-family:var(--FM);border-radius:20px;padding:2px 8px;border:1px solid}

/* SETTINGS */
.pf-hero{background:linear-gradient(145deg,var(--bg2),var(--bg1));border:1px solid var(--brd);border-radius:var(--r);padding:22px;margin-bottom:14px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;overflow:hidden}
.pf-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.08),transparent);pointer-events:none}
.pf-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(0,229,255,.2),rgba(124,131,255,.18));border:2px solid rgba(0,229,255,.38);display:flex;align-items:center;justify-content:center;font-family:var(--FD);font-size:22px;font-weight:800;color:var(--cy);box-shadow:0 0 18px rgba(0,229,255,.18);cursor:pointer;transition:all var(--T)}
.pf-av:hover{box-shadow:0 0 28px rgba(0,229,255,.3)}
.pf-nm{font-family:var(--FD);font-size:18px;font-weight:700;color:var(--tx);text-align:center}
.pf-ro{font-size:12px;color:var(--tx3);font-family:var(--FM);letter-spacing:.8px}
.srow{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--brd2)}
.srow:last-child{border-bottom:none}
.sr-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sr-inf{flex:1;overflow:hidden}
.sr-t{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-s{font-size:11.5px;color:var(--tx3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tgl{width:42px;height:22px;border-radius:11px;background:var(--bg3);border:1px solid var(--brd2);cursor:pointer;position:relative;transition:all var(--T);flex-shrink:0}
.tgl.on{background:rgba(0,229,255,.18);border-color:rgba(0,229,255,.38)}
.tgl-th{width:16px;height:16px;border-radius:50%;background:var(--tx3);position:absolute;top:2px;left:2px;transition:all var(--T)}
.tgl.on .tgl-th{left:22px;background:var(--cy);box-shadow:0 0 7px var(--cy)}
.intg{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);margin-bottom:7px;transition:border-color var(--T)}
.intg:hover{border-color:var(--brd)}
.intg-ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;background:var(--bg3)}
.intg-inf{flex:1;overflow:hidden}
.intg-nm{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.intg-ds{font-size:11px;color:var(--tx3);margin-top:1px}
.intg-st{font-size:10px;font-family:var(--FM);padding:3px 10px;border-radius:20px;cursor:pointer;transition:all var(--T);flex-shrink:0;border:1px solid}
.intg-st.conn{background:rgba(0,230,118,.1);color:var(--gn);border-color:rgba(0,230,118,.22)}
.intg-st.disc{background:var(--bg3);color:var(--tx3);border-color:var(--brd2)}
.intg-st.disc:hover{background:rgba(0,229,255,.08);color:var(--cy);border-color:var(--brd)}
.sp-g{display:flex;gap:7px;flex-wrap:wrap;margin-top:7px}
.sp{font-size:11.5px;font-family:var(--FM);padding:5px 13px;border-radius:20px;cursor:pointer;border:1px solid var(--brd2);color:var(--tx3);background:var(--bg2);transition:all var(--T)}
.sp:hover{color:var(--tx2);border-color:var(--brd)}
.sp.on{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.28);color:var(--cy)}
.dz{background:rgba(255,82,82,.05);border:1px solid rgba(255,82,82,.17);border-radius:var(--r);padding:16px;margin-top:6px}
.dz-t{font-size:10px;font-family:var(--FM);font-weight:700;color:var(--rd);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}

/* OVERLAY / MODAL */
.overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);z-index:100;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r) var(--r) 0 0;padding:22px;width:100%;max-height:86vh;overflow-y:auto;animation:mup .28s ease}
@keyframes mup{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.mt2{font-family:var(--FD);font-size:16px;font-weight:700;color:var(--tx);display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mc2{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;line-height:1;transition:color var(--T)}
.mc2:hover{color:var(--tx)}
.fg{margin-bottom:12px}
.fl2{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--FM);margin-bottom:6px;display:block}
.frow2{display:flex;gap:8px}
.cbx{background:rgba(255,82,82,.06);border:1px solid rgba(255,82,82,.2);border-radius:var(--rs);padding:13px;margin-bottom:12px;font-size:13px;color:var(--tx2);line-height:1.6}

/* PIN */
.pin-screen{display:none;position:absolute;inset:0;z-index:500;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:22px}
.pin-screen.show{display:flex}
.pin-orb{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.2),transparent);border:2px solid rgba(0,229,255,.38);display:flex;align-items:center;justify-content:center;font-family:var(--FD);font-size:20px;font-weight:800;letter-spacing:3px;color:var(--cy)}
.pin-nm{font-family:var(--FD);font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--tx)}
.pin-sb2{font-size:11px;color:var(--tx3);font-family:var(--FM);letter-spacing:.8px}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--tx3);transition:all var(--T)}
.pin-dot.filled{background:var(--cy);border-color:var(--cy);box-shadow:0 0 7px var(--cy)}
.pin-dot.error{background:var(--rd);border-color:var(--rd);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:196px}
.pin-k{height:50px;border-radius:10px;background:var(--bg2);border:1px solid var(--brd2);color:var(--tx);font-family:var(--FM);font-size:16px;font-weight:600;cursor:pointer;transition:all var(--T);display:flex;align-items:center;justify-content:center}
.pin-k:hover{background:var(--bg3);border-color:var(--brd);color:var(--cy)}
.pin-k:active{transform:scale(.95)}
.pin-k.del{font-size:12px;color:var(--tx3)}

/* ══ LOGIN MODAL ══════════════════════════════════════════ */
/* ══ LOGIN CSS ══════════════════════════════════════════ */
.login-backdrop{position:fixed;inset:0;z-index:600;background:rgba(5,12,24,.96);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px}
.login-backdrop.hidden{display:none}
.login-box{background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);padding:36px 28px 28px;width:100%;max-width:420px;max-height:92vh;overflow-y:auto;animation:lboxin .35s cubic-bezier(.34,1.4,.64,1);scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
@keyframes lboxin{from{transform:translateY(24px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.login-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.login-orb{width:58px;height:58px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,.22),transparent);border:2px solid rgba(0,229,255,.4);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.login-orb::before{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,229,255,.3);animation:orbsp 9s linear infinite}
.login-orb-c{width:9px;height:9px;border-radius:50%;background:var(--cy);box-shadow:0 0 12px var(--cy);animation:orbp 2.5s ease-in-out infinite;z-index:1}
.login-title{font-family:var(--FD);font-size:24px;font-weight:800;letter-spacing:6px;text-transform:uppercase;color:var(--tx);line-height:1}
.login-title em{color:var(--cy);font-style:normal;text-shadow:0 0 14px var(--cg)}
.login-sub{font-size:12px;color:var(--tx3);font-family:var(--FM);letter-spacing:.8px}
.login-tabs{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;margin-bottom:24px;border:1px solid var(--brd2);gap:3px}
.ltab{flex:1;padding:9px;border-radius:6px;background:transparent;border:none;color:var(--tx3);font-size:13px;font-weight:500;font-family:var(--FB);cursor:pointer;transition:all var(--T)}
.ltab.on{background:var(--bg1);color:var(--cy);border:1px solid var(--brd);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.login-fg{margin-bottom:16px}
.login-fl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;font-family:var(--FM);margin-bottom:7px;display:block}
.login-inp-wrap{position:relative;display:flex;align-items:center}
.login-inp{width:100%;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);padding:12px 16px;font-size:14px;color:var(--tx);font-family:var(--FB);outline:none;transition:border-color var(--T),box-shadow var(--T)}
.login-inp:focus{border-color:rgba(0,229,255,.42);box-shadow:0 0 0 3px rgba(0,229,255,.07)}
.login-inp::placeholder{color:var(--tx3);font-size:13px}
.login-inp.has-eye{padding-right:46px}
.eye-btn{position:absolute;right:0;top:0;bottom:0;width:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);background:none;border:none;font-size:18px;transition:color var(--T);flex-shrink:0}
.eye-btn:hover{color:var(--cy)}
.login-remember{display:flex;align-items:center;gap:10px;margin-bottom:20px;cursor:pointer;user-select:none}
.remember-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--brd);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--T);font-size:11px;font-weight:700}
.remember-box.on{background:rgba(0,229,255,.15);border-color:var(--cy);color:var(--cy)}
.remember-lbl{font-size:13px;color:var(--tx2)}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(0,229,255,.22),rgba(0,180,255,.14));border:1px solid rgba(0,229,255,.4);border-radius:var(--rs);color:var(--cy);font-size:15px;font-weight:600;font-family:var(--FB);cursor:pointer;transition:all var(--T);box-shadow:0 0 20px rgba(0,229,255,.12);margin-bottom:12px}
.login-btn:hover{background:linear-gradient(135deg,rgba(0,229,255,.32),rgba(0,180,255,.22));box-shadow:0 0 28px rgba(0,229,255,.25);transform:translateY(-1px)}
.login-link{background:none;border:none;color:var(--cy);font-size:12px;font-family:var(--FM);cursor:pointer;text-decoration:underline;padding:0;transition:opacity var(--T)}
.login-link:hover{opacity:.7}
.login-err{background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.22);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--rd);margin-bottom:16px;display:none;align-items:center;gap:8px}
.login-err.show{display:flex}
.login-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--tx3);font-size:11px;font-family:var(--FM)}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--brd2)}
.guest-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--brd2);border-radius:var(--rs);color:var(--tx3);font-size:13px;font-weight:500;font-family:var(--FB);cursor:pointer;transition:all var(--T);display:flex;align-items:center;justify-content:center;gap:8px}
.guest-btn:hover{border-color:var(--brd);color:var(--tx2);background:var(--bg2)}
/* Password field wrapper */
.pass-wrap{position:relative;display:flex;align-items:center}
.pass-wrap .login-inp{padding-right:44px}
.pass-eye{position:absolute;right:14px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;line-height:1;padding:4px;transition:color var(--T);flex-shrink:0}
.pass-eye:hover{color:var(--cy)}
/* Remember checkbox */
.login-remember{display:flex;align-items:center;gap:10px;margin:14px 0 18px;cursor:pointer;user-select:none}
.login-remember-box{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--brd);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all var(--T)}
.login-remember-box.on{background:rgba(0,229,255,.15);border-color:var(--cy);color:var(--cy)}
.login-remember-lbl{font-size:13px;color:var(--tx2)}
.saved-chip{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--brd2);border-radius:var(--rs);margin-bottom:7px;transition:border-color var(--T)}
.saved-chip:hover{border-color:var(--brd)}
.saved-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,rgba(0,229,255,.22),rgba(124,131,255,.18));border:1px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;font-family:var(--FD);font-size:11px;font-weight:800;color:var(--cy);flex-shrink:0}
.saved-info{flex:1;overflow:hidden}
.saved-name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-email{font-size:11px;color:var(--tx3);font-family:var(--FM)}

/* Welcome screen */
.welcome-screen{position:fixed;inset:0;z-index:550;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeIn .4s ease;text-align:center;padding:32px}
.welcome-screen.hidden{display:none}
.welcome-av{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--FD);font-size:28px;font-weight:800;color:var(--cy);border:2px solid rgba(0,229,255,.4);box-shadow:0 0 28px rgba(0,229,255,.22);animation:orbp 2.5s ease-in-out infinite}
.welcome-greeting{font-size:14px;color:var(--cy);font-family:var(--FM);letter-spacing:2px;text-transform:uppercase}

.welcome-bar{width:200px;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.welcome-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cy),var(--pu));animation:wload 2s ease forwards}
@keyframes wload{from{width:0}to{width:100%}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* User menu in header */
.user-menu{position:relative}
.user-chip{display:flex;align-items:center;gap:7px;background:rgba(0,229,255,.07);border:1px solid var(--brd2);border-radius:20px;padding:4px 12px 4px 5px;cursor:pointer;transition:all var(--T);font-size:12px;color:var(--tx2);font-family:var(--FM)}
.user-chip:hover{background:rgba(0,229,255,.12);border-color:var(--brd);color:var(--tx)}
.user-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,rgba(0,229,255,.3),rgba(124,131,255,.2));display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--cy);font-family:var(--FD)}
.user-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg1);border:1px solid var(--brd);border-radius:var(--r);min-width:180px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.4);display:none;z-index:50}
.user-dropdown.show{display:block;animation:mup .2s ease}
.ud-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;font-size:13px;color:var(--tx2);transition:background var(--T);border-bottom:1px solid var(--brd2)}
.ud-item:last-child{border-bottom:none}
.ud-item:hover{background:rgba(0,229,255,.06);color:var(--tx)}
.ud-item.danger{color:var(--rd)}
.ud-item.danger:hover{background:rgba(255,82,82,.07)}

/* Locked app overlay */
.app-locked{pointer-events:none;filter:blur(3px) brightness(.4);user-select:none}

/* Session settings row */
.session-pill{font-size:11px;font-family:var(--FM);padding:4px 12px;border-radius:20px;cursor:pointer;border:1px solid var(--brd2);color:var(--tx3);background:var(--bg2);transition:all var(--T);margin-right:5px}
.session-pill:hover{color:var(--tx2);border-color:var(--brd)}
.session-pill.on{background:rgba(0,229,255,.1);border-color:rgba(0,229,255,.28);color:var(--cy)}
/* Notif badge on login */
.notif-banner{background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.18);border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:var(--tx2);display:flex;align-items:center;gap:9px;margin-bottom:14px}
.notif-banner-dot{width:6px;height:6px;border-radius:50%;background:var(--cy);box-shadow:0 0 6px var(--cy);flex-shrink:0}

</style>
</head>
<body>
<div class="nebula"></div>
<div class="scan"></div>

<!-- ══ LOGIN MODAL ══════════════════════════════════════ -->
<div class="login-backdrop" id="login-backdrop">

    <!-- Brand -->

<!-- ══ WELCOME SCREEN ═══════════════════════════════════ -->
<div class="welcome-screen hidden" id="welcome-screen">

  <div class="welcome-msg" id="welcome-msg">Sua rotina está pronta para hoje.</div>
  <div class="welcome-bar"><div class="welcome-bar-fill"></div></div>
</div>

<div class="app" id="app">

  <!-- TOAST STACK -->
  <div class="toast-stack" id="toast-stack"></div>

  <!-- PIN SCREEN -->
  <div class="pin-screen" id="pin-screen">
    <div class="pin-orb" id="pin-orb-txt">N</div>
    <div class="pin-nm">NEXUS</div>
    <div class="pin-sb2">Digite seu PIN para continuar</div>
    <div class="pin-dots" id="pin-dots"></div>
    <div class="pin-pad" id="pin-pad"></div>
  </div>

  <!-- HEADER -->
  <div class="hdr" id="hdr">
    <div class="hdr-top">
      <div class="brand">
        <div class="orb"><div class="orb-c"></div></div>
        <div class="brand-name">NEX<em>US</em></div>
      </div>
      <div class="st-pill" id="st-pill"><div class="sdot"></div><span id="st-label">ONLINE</span></div>
      <div class="user-menu" id="user-menu" style="display:none">
        <div class="user-chip" onclick="toggleUserMenu()">
          <div class="user-av" id="header-av">N</div>
          <span id="header-name">Usuário</span>
          <span style="font-size:9px;margin-left:2px">▾</span>
        </div>
        <div class="user-dropdown" id="user-dropdown">
          <div class="ud-item" onclick="openUserSettings()">⚙ Configurações</div>

          <div class="ud-item danger" onclick="logout()">↩ Sair</div>

    <!-- CHAT VIEW -->

  <!-- BOTTOM NAV -->
  <div class="bnav" id="bnav">
    <button class="nbtn on" data-p="chat" onclick="goPanel('chat')"><span class="ni2">◈</span><span class="nl">Chat</span></button>
    <button class="nbtn" data-p="goals" onclick="goPanel('goals')"><span class="ni2">◎</span><span class="nl">Metas</span></button>
    <button class="nbtn" data-p="calendar" onclick="goPanel('calendar')"><span class="ni2">🗓</span><span class="nl">Cal.</span></button>
    <button class="nbtn" data-p="routine" onclick="goPanel('routine')"><span class="ni2">⚡</span><span class="nl">Rotina</span></button>
    <button class="nbtn" data-p="finance" onclick="goPanel('finance')"><span class="ni2">$</span><span class="nl">Fin.</span></button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const TODAY = new Date();
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const clock = () => new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
const fmt = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const pct = g => g.sub.length ? Math.round(g.sub.filter(s=>s.d).length/g.sub.length*100) : 0;
const getInits = n => n.trim().split(' ').slice(0,2).map(x=>x[0]||'').join('').toUpperCase()||'N';
function offDay(n){const d=new Date(TODAY);d.setDate(d.getDate()+n);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

const S = {
  panel:'chat', focus:false,
  toastId:0, busy:false,
  calYear:TODAY.getFullYear(), calMonth:TODAY.getMonth(), selDay:null,
  expandedGoal:null, dailyNote:'',
  pinInput:'', pinErr:false, settingPin:'',
  alerts:[],
  profile:{name:'Astronauta',profession:'',commStyle:'tecnológico e direto',lifeGoalShort:'',lifeGoalMid:'',lifeGoalLong:'',language:'pt-BR',timezone:'America/Sao_Paulo'},
  notif:{dailyAlert:true,weeklyReport:true,silentStart:'22:00',silentEnd:'07:00'},
  privacy:{pinEnabled:false,pin:'',privateMode:false},
  integs:[
    {id:'gcal',name:'Google Calendar',desc:'Sincronizar eventos',icon:'📅',connected:false},
    {id:'gfit',name:'Apple Health / Google Fit',desc:'Dados de saúde',icon:'🏃',connected:false},
    {id:'sheets',name:'Google Sheets',desc:'Exportar financeiro',icon:'📊',connected:false},
    {id:'strava',name:'Strava',desc:'Corrida e atividades',icon:'🚴',connected:false},
    {id:'gymrats',name:'GymRats',desc:'Exercícios e disciplina',icon:'💪',connected:false},
  ],
  tasks:[
    {id:1,title:'Revisar e-mails da manhã',done:false,priority:'alta',date:todayStr()},
    {id:2,title:'Reunião de planejamento',done:true,priority:'alta',date:todayStr()},
    {id:3,title:'Estudar 20 minutos',done:false,priority:'média',date:todayStr()},
  ],
  habits:[
    {id:1,name:'Beber 2L de água',emoji:'💧',streak:5,done:false},
    {id:2,name:'Meditação matinal',emoji:'🧘',streak:12,done:true},
    {id:3,name:'Caminhar 30 minutos',emoji:'🚶',streak:3,done:false},
    {id:4,name:'Leitura noturna',emoji:'📖',streak:7,done:false},
  ],
  events:[
    {id:1,title:'Reunião de equipe',date:todayStr(),time:'10:00',category:'trabalho',recurrence:'weekly'},
    {id:2,title:'Consulta médica',date:offDay(3),time:'14:30',category:'saúde',recurrence:'none'},
    {id:3,title:'Academia',date:todayStr(),time:'07:00',category:'saúde',recurrence:'daily'},
    {id:4,title:'Revisão semanal',date:offDay(2),time:'09:00',category:'trabalho',recurrence:'weekly'},
  ],
  goals:[
    {id:1,title:'Ler 12 livros este ano',deadline:'2025-12-31',category:'Desenvolvimento',sub:[{id:1,t:'Montar lista',d:true},{id:2,t:'Ler 30 min/dia',d:true},{id:3,t:'Escrever resumo',d:false}],ci:[{date:'10/03',note:'3º livro concluído 📚'}]},
    {id:2,title:'Economizar R$5.000 até junho',deadline:'2025-06-30',category:'Finanças',sub:[{id:4,t:'Cortar gastos',d:true},{id:5,t:'Transferir R$500/mês',d:false}],ci:[]},
  ],
  txns:[
    {id:1,desc:'Salário',amount:4500,cat:'Receita',type:'income',date:'01/03'},
    {id:2,desc:'Supermercado',amount:380,cat:'Alimentação',type:'expense',date:'05/03'},
    {id:3,desc:'Streaming',amount:65,cat:'Assinaturas',type:'expense',date:'08/03'},
    {id:4,desc:'Aluguel',amount:1200,cat:'Moradia',type:'expense',date:'10/03'},
  ],
  msgs:[],
};

// ═══════════════════════════════════════════════
// DERIVED
// ═══════════════════════════════════════════════
const inc = () => S.txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
const exp = () => S.txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
const bal = () => inc()-exp();
const tdone = () => S.tasks.filter(t=>t.done).length;
const hdone = () => S.habits.filter(h=>h.done).length;
const overLim = () => exp()>2500;
const todEvts = () => S.events.filter(e=> e.date===todayStr()||(e.recurrence==='daily')||(e.recurrence==='weekly'&&new Date(e.date).getDay()===TODAY.getDay()));

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(txt){
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<div class="toast-d"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${txt}</span>`;
  document.getElementById('toast-stack').appendChild(el);
  setTimeout(()=>el.remove(),2600);
}

// ═══════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════
// HUD PANEL STATE
S.hudOpen = false;
S.hudVisible = {tasks:true, habits:true, today:true, finance:true};

function toggleHUD(){
  S.hudOpen = !S.hudOpen;
  const panel = document.getElementById('hud-panel');
  const chev  = document.getElementById('hud-chevron');
  panel.classList.toggle('open', S.hudOpen);
  chev.textContent = S.hudOpen ? '\u25b2 PAINEL' : '\u25bc PAINEL';
  if(S.hudOpen) renderHUDPanel();
}

function renderHUD(){
  const alerts = buildAlertList();
  const badge  = document.getElementById('hud-badge');
  if(badge){ badge.textContent = alerts.length||''; badge.classList.toggle('show', alerts.length>0); }
  if(S.hudOpen) renderHUDPanel();
}

function buildAlertList(){
  const a=[];
  if(overLim())       a.push({txt:`Limite mensal atingido — ${fmt(exp())}`, crit:true});
  if(bal()<0)         a.push({txt:`Saldo negativo: ${fmt(bal())}`, crit:true});
  S.goals.forEach(g=>{ if(pct(g)<40) a.push({txt:`Meta em risco: "${g.title.slice(0,22)}"`, crit:false}); });
  if(!hdone())        a.push({txt:'Nenhum hábito registrado hoje', crit:false});
  const tod = todEvts();
  if(tod.length>=2)   a.push({txt:`Você tem ${tod.length} compromissos hoje`, crit:false});
  return a;
}

function renderHUDPanel(){
  const pm = S.privacy.privateMode;
  const tp = S.tasks.length  ? Math.round(tdone()/S.tasks.length*100)  : 0;
  const hp = S.habits.length ? Math.round(hdone()/S.habits.length*100) : 0;
  const sg = Math.min(100, Math.round(Math.max(0,bal())/5000*100));
  const alerts = buildAlertList();
  const hlEl = document.getElementById('hud-highlights');
  if(hlEl){
    if(alerts.length){
      hlEl.innerHTML = alerts.slice(0,2).map(a=>`<div class="hud-highlight ${a.crit?'crit':''}"><div class="hud-highlight-dot"></div><span>${a.txt}</span></div>`).join('');
    } else {
      hlEl.innerHTML = `<div class="hud-highlight"><div class="hud-highlight-dot"></div><span>Tudo em dia — nenhum alerta no momento!</span></div>`;
    }
  }
  const allCards=[
    {key:'tasks',  icon:'\u2713',lbl:'Tarefas', val:`${tdone()}/${S.tasks.length}`,  pct:tp, cls:tp===100?'g':'', dest:'tasks',   warn:false, blur:false},
    {key:'habits', icon:'\u25cc',lbl:'Hábitos', val:`${hdone()}/${S.habits.length}`, pct:hp, cls:hp===100?'g':'', dest:'routine', warn:false, blur:false},
    {key:'today',  icon:'\ud83d\udcc5',lbl:'Hoje', val:`${todEvts().length} eventos`, pct:Math.min(100,todEvts().length*25), cls:'', dest:'calendar', warn:false, blur:false},
    {key:'finance',icon:'\u25c8',lbl:'Saldo',   val:fmt(bal()),                      pct:sg, cls:sg>60?'g':'w',  dest:'finance', warn:overLim()||bal()<0, blur:pm},
  ].filter(c=>S.hudVisible[c.key]);
  const grid=document.getElementById('hud-grid');

function fmtTxt(t){

    if(l.startsWith('- ')||l.startsWith('• ')) return `<li>${l.slice(2)}</li>`;

  }).join('').replace(/(<li>.*<\/li>)+/g,m=>`<ul>${m}</ul>`);

function dcHTML(c){

const ACT_LBL={
  add_task:p=>`Tarefa: "${p.title}"`,
  complete_task:p=>`Concluída: "${p.title}"`,
  add_goal:p=>`Meta: "${p.title}"`,
  add_habit:p=>`Hábito: "${p.name}"`,

  add_transaction:p=>`Lançamento: ${p.desc} ${fmt(parseFloat(p.amount)||0)}`,
  add_event:p=>`Evento: "${p.title}" ${p.date} ${p.time}`,
};
function execAct(act,log){
  const p=act.payload||{};
  if(log) log.push((ACT_LBL[act.type]||((p)=>act.type))(p));
  if(act.type==='add_task') S.tasks.push({id:Date.now(),title:p.title,done:false,priority:p.priority||'média',date:todayStr()});
  if(act.type==='complete_task') S.tasks=S.tasks.map(t=>t.title.toLowerCase().includes((p.title||'').toLowerCase())?{...t,done:true}:t);
  if(act.type==='add_goal') S.goals.push({id:Date.now(),title:p.title,deadline:p.deadline||'',category:p.category||'Outro',sub:[],ci:[]});
  if(act.type==='add_habit') S.habits.push({id:Date.now(),name:p.name,emoji:p.emoji||'⭐',streak:0,done:false});
  if(act.type==='mark_habit') S.habits=S.habits.map(h=>h.name.toLowerCase().includes((p.name||'').toLowerCase())?{...h,done:true,streak:h.streak+1}:h);
  if(act.type==='add_transaction') S.txns.push({id:Date.now(),desc:p.desc,amount:parseFloat(p.amount)||0,cat:p.category||'Outro',type:p.type||'expense',date:new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})});
  if(act.type==='add_event') S.events.push({id:Date.now(),title:p.title,date:p.date||todayStr(),time:p.time||'09:00',category:p.category||'outro',recurrence:p.recurrence||'none'});
  renderHUD(); computeAlerts();
}
function parseActs(raw){
  const acts=[],re=/<nexus_action>([\s\S]*?)<\/nexus_action>/g;let m;
  while((m=re.exec(raw))!==null){try{acts.push(JSON.parse(m[1]));}catch{}}
  return{clean:raw.replace(/<nexus_action>[\s\S]*?<\/nexus_action>/g,'').trim(),acts};
}

// SEND
// ═══════════════════════════════════════════════
async function sendMsg(){
  const el=document.getElementById('chat-inp');
  const msg=el.value.trim();
  if(!msg||S.busy) return;
  el.value=''; el.style.height='';
  document.getElementById('slash-pal').style.display='none';
  const slash=SLASH.find(c=>c.cmd===msg.split(' ')[0]);
  if(slash){doSlash(slash.cmd);return;}
  pushMsg({role:'user',tp:'n',text:msg});
  S.busy=true; document.getElementById('send-btn').disabled=true; renderMsgs();
  const hist=S.msgs.slice(-16).map(m=>({role:m.role==='nexus'?'assistant':'user',content:m.text+(m.log&&m.log.length?'\n[Ações: '+m.log.join('; ')+']':'')}));
  try{
    // Build system prompt — memory errors must never block the API call
    let sysPrompt;
    try{ sysPrompt = await buildSys(); }
    catch(memErr){ console.warn('NEXUS mem ctx error (non-fatal):',memErr); sysPrompt = buildSysBasic(); }

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysPrompt,messages:[...hist,{role:'user',content:msg}]})
    });

    if(!res.ok){
      const errData = await res.json().catch(()=>({}));
      throw new Error(`API ${res.status}: ${errData?.error?.message||res.statusText}`);
    }

    const data=await res.json();
    const raw=data.content?.[0]?.text||'Falha na resposta. Tente novamente.';
    const{clean,acts}=parseActs(raw);
    const log=[];
    acts.forEach(a=>execAct(a,log));
    autoSave();
    const tp=log.length>0?'act':/você quis dizer|poderia esclarecer/i.test(clean)?'clr':'n';
    pushMsg({role:'nexus',tp,text:clean,log:log.length?log:undefined});
    // Save to memory async — never block UI
    memSave(msg, clean).catch(e=>console.warn('NEXUS memSave:',e));
  }catch(err){
    console.warn('NEXUS send error:', err?.message||err);
    const isOffline   = !navigator.onLine;
    const isCORS      = err instanceof TypeError && err.message.includes('Failed to fetch');
    const isAPIKey    = err?.message?.includes('401') || err?.message?.includes('authentication');
    const isRateLimit = err?.message?.includes('429') || err?.message?.includes('rate');
    let errMsg;
    if(isOffline){
      errMsg = '**Sem conexão** — você está offline. Reconecte-se à internet para conversar com a IA.\n\nSuas tarefas, hábitos e dados continuam disponíveis offline.';
    } else if(isAPIKey){
      errMsg = 'Erro de autenticação com a API. Verifique se a chave está configurada corretamente.';
    } else if(isRateLimit){
      errMsg = 'Limite de requisições atingido. Aguarde alguns segundos e tente novamente.';
    } else if(isCORS){
      errMsg = 'Não foi possível contactar a IA (erro de rede). Verifique sua conexão e tente novamente.';
    } else {
      errMsg = `Erro ao contactar a IA: ${err?.message||'desconhecido'}. Tente novamente.`;
    }
    pushMsg({role:'nexus',tp:'n',text:errMsg});
  }
  finally{S.busy=false;document.getElementById('send-btn').disabled=false;renderMsgs();}
}

const CAT_COL={trabalho:'var(--cy)',pessoal:'var(--pu)',saúde:'var(--gn)',outro:'var(--am)'};

function getDays(y,m){
  const days=[];let fd=new Date(y,m,1).getDay();fd=fd===0?6:fd-1;
  const dim=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  for(let i=fd-1;i>=0;i--) days.push({d:prev-i,c:false,y:m===0?y-1:y,m:m===0?11:m-1});
  for(let i=1;i<=dim;i++) days.push({d:i,c:true,y,m});
  const rem=42-days.length;
  for(let i=1;i<=rem;i++) days.push({d:i,c:false,y:m===11?y+1:y,m:m===11?0:m+1});
  return days;
}
function ds(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getEvDay(y,m,d){
  const s=ds(y,m,d),dow=new Date(y,m,d).getDay();
  return S.events.filter(e=>e.date===s||(e.recurrence==='daily')||(e.recurrence==='weekly'&&new Date(e.date).getDay()===dow)||(e.recurrence==='monthly'&&parseInt(e.date.split('-')[2])===d));
}
function isTod(y,m,d){return y===TODAY.getFullYear()&&m===TODAY.getMonth()&&d===TODAY.getDate();}
function isSel(y,m,d){return S.selDay&&S.selDay.y===y&&S.selDay.m===m&&S.selDay.d===d;}

function renderCalendar(el){
  const sd=S.selDay;
  const selHtml=sd?(()=>{
    const evs=getEvDay(sd.y,sd.m,sd.d);
    const lbl=new Date(sd.y,sd.m,sd.d).toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    return `<div class="day-det"><div class="day-det-hd"><span class="day-det-t">${lbl}</span><button class="btn sm ghost" onclick="openModal('event','${ds(sd.y,sd.m,sd.d)}')">+ Evento</button></div>
    ${evs.length?evs.map(e=>`<div class="ev-item"><div class="ev-bar" style="background:${CAT_COL[e.category]||'var(--tx3)'}"></div><div class="ev-info"><div class="ev-tt">${e.title}</div><div class="ev-mt">${e.time}${e.recurrence!=='none'?`<span class="rec-b">↺ ${REC_LBL[e.recurrence]}</span>`:''}</div></div><span class="ev-bg" style="${CAT_TX[e.category]||''};background:${CAT_BG2[e.category]||'transparent'};border-color:transparent">${e.category}</span></div>`).join(''):'<div class="empty" style="padding:14px 0"><div class="ei">🗓</div><p>Nenhum evento</p></div>'}
    </div>`;
  })():'';

  el.innerHTML=`<div class="panel" style="position:absolute;inset:0">
    <div class="phdr"><button class="pback" onclick="goPanel('chat')">←</button><span class="pt">🗓 CALENDÁRIO</span><button class="btn sm" style="margin-left:auto" onclick="openModal('event','${todayStr()}')">+ Evento</button></div>
    <div class="pbody">
      <div class="cal-nav">
        <button class="cal-arr" onclick="calNav(-1)">‹</button>
        <span class="cal-mo">${CAL_MONTHS[S.calMonth]} ${S.calYear}</span>
        <button class="cal-arr" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-dow">${['SEG','TER','QUA','QUI','SEX','SÁB','DOM'].map(d=>`<div class="cal-dow-c">${d}</div>`).join('')}</div>
      <div class="cal-grid">
        ${getDays(S.calYear,S.calMonth).map(cell=>{
          const evs=getEvDay(cell.y,cell.m,cell.d);
          const tod=isTod(cell.y,cell.m,cell.d),sel=isSel(cell.y,cell.m,cell.d);
          return `<div class="cal-d ${!cell.c?'oth':''} ${tod?'tod':''} ${sel?'sel':''}" onclick="selDay(${cell.y},${cell.m},${cell.d})">
            ${tod?`<div class="td2"></div><span class="cal-dn" style="font-size:10px">${cell.d}</span>`:`<span class="cal-dn">${cell.d}</span>`}
            ${evs.length?`<div class="ev-dots">${evs.slice(0,3).map(e=>`<div class="ev-d ${CAT_DOT[e.category]||'eo'}"></div>`).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      ${selHtml}
      <div class="slbl" style="margin-top:16px">Próximos Eventos</div>
      ${S.events.filter(e=>e.recurrence==='none'&&e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).slice(0,4).map(e=>`<div class="ev-item"><div class="ev-bar" style="background:${CAT_COL[e.category]||'var(--tx3)'}"></div><div class="ev-info"><div class="ev-tt">${e.title}</div><div class="ev-mt">${new Date(e.date).toLocaleDateString('pt-BR',{day:'numeric',month:'short'})} · ${e.time}</div></div><span class="ev-bg" style="${CAT_TX[e.category]||''};background:${CAT_BG2[e.category]||'transparent'};border-color:transparent">${e.category}</span></div>`).join('')}
    </div>
  </div>`;
}
function calNav(dir){S.calMonth+=dir;if(S.calMonth>11){S.calMonth=0;S.calYear++;}if(S.calMonth<0){S.calMonth=11;S.calYear--;}refreshPanel();}
function selDay(y,m,d){if(S.selDay&&S.selDay.y===y&&S.selDay.m===m&&S.selDay.d===d)S.selDay=null;else S.selDay={y,m,d};refreshPanel();}

function renderRoutine(el){
  const tevts=todEvts(),ttasks=S.tasks.filter(t=>t.date===todayStr());
  const tot=ttasks.length+S.habits.length,dn=ttasks.filter(t=>t.done).length+hdone();
  const rp=tot?Math.round(dn/tot*100):0;
  const habs=S.habits.map(h=>({kind:'habit',id:h.id,title:h.name,emoji:h.emoji,streak:h.streak,done:h.done,sort:'00:00',tl:'Recorrente'}));
  const tasks=ttasks.map(t=>({kind:'task',id:t.id,title:t.title,done:t.done,prio:t.priority,sort:'12:00',tl:'Hoje'}));
  const evs=tevts.map(e=>({kind:'event',id:e.id,title:e.title,time:e.time,cat:e.category,rec:e.recurrence,date:e.date,sort:e.time,tl:e.time}));
  const others=[...tasks,...evs].sort((a,b)=>a.sort.localeCompare(b.sort));

  function trow(item,i,arr){
    const conn=i<arr.length-1;
    const dc=item.kind==='habit'?`hb${item.done?' dn':''}`:item.kind==='task'?`tk${item.done?' dn':''}`:'ev';
    const di=item.kind==='habit'?(item.done?'✓':'○'):item.kind==='task'?(item.done?'✓':'☐'):'●';
    const oc=item.kind==='habit'?`onclick="togHabit(${item.id})"`:item.kind==='task'?`onclick="togTask(${item.id})"`: '';
    let body=`<div class="tl-b"><div class="tl-tm">${item.tl}</div><div class="tl-tt ${item.done?'dn':''}">${item.kind==='habit'?item.emoji+' ':''}${item.title}</div><div class="tl-sb">`;
    if(item.kind==='habit') body+=`<span class="sk-tag">🔥 ${item.streak} dias</span>`;
    if(item.kind==='task') body+=`<span class="badge ${item.prio==='alta'?'bh':item.prio==='média'?'bm':'bl'}">${item.prio}</span>`;
    if(item.kind==='event') body+=`<span class="cat-tag" style="${CAT_TX[item.cat]||''};background:${CAT_BG2[item.cat]||'transparent'};border-color:transparent">${item.cat}</span><span class="ev-lk" onclick="jumpEvt('${item.date}')">Ver no Cal →</span>`;
    body+=`</div></div>`;
    return `<div class="tl-i"><div class="tl-ln"><div class="tl-d ${dc}" ${oc}>${di}</div>${conn?'<div class="tl-con"></div>':''}</div>${body}</div>`;
  }

  el.innerHTML=`<div class="panel" style="position:absolute;inset:0">
    <div class="phdr"><button class="pback" onclick="goPanel('chat')">←</button><span class="pt">⚡ ROTINA</span><span style="margin-left:auto;font-size:12px;color:var(--cy);font-family:var(--FM);font-weight:600">${rp}%</span></div>
    <div class="pbody">
      <div class="hero">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px;color:var(--tx2)">Progresso do dia</span><span style="font-family:var(--FM);font-size:24px;font-weight:700;color:${rp===100?'var(--gn)':'var(--cy)'}">${rp}%</span></div>
        <div class="pbar" style="height:6px;margin-bottom:12px"><div class="pfill ${rp===100?'g':''}" style="width:${rp}%"></div></div>
        <div class="rsum">
          <div class="rsmc"><div class="rsmv" style="color:var(--am)">${hdone()}/${S.habits.length}</div><div class="rsml">Hábitos</div></div>
          <div class="rsmc"><div class="rsmv" style="color:var(--cy)">${ttasks.filter(t=>t.done).length}/${ttasks.length}</div><div class="rsml">Tarefas</div></div>
          <div class="rsmc"><div class="rsmv" style="color:var(--pu)">${tevts.length}</div><div class="rsml">Eventos</div></div>
        </div>
      </div>
      <div class="slbl">Nota do Dia</div>
      <textarea class="dnote" placeholder="Notas, intenções ou reflexões de hoje…" rows="3" onchange="S.dailyNote=this.value">${S.dailyNote}</textarea>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input class="inp" id="qt-inp" placeholder="Tarefa rápida…" style="flex:1" onkeydown="if(event.key==='Enter')addQT()">
        <button class="btn sm" onclick="addQT()">+</button>
      </div>
      ${habs.length?`<div class="tl-gl">Hábitos Recorrentes</div>${habs.map((h,i)=>trow(h,i,habs)).join('')}`:''}
      ${others.length?`<div class="tl-gl">Tarefas e Compromissos</div>${others.map((h,i)=>trow(h,i,others)).join('')}`:''}
    </div>
  </div>`;
}

// NEXUS MEMORY ENGINE v12
// ═══════════════════════════════════════════════
const MEM_DB_NAME    = 'nexus_memory';
const MEM_DB_VER     = 1;
const MEM_STORE      = 'interactions';
const MEM_PREF_KEY   = 'nexus_mem_prefs';
const MEM_RETENTION  = 180; // days
const MEM_MAX        = 500; // max interactions
const MEM_COMPRESS_AT= 50;  // compress oldest N when limit hit
const TAG_KEYWORDS   = {
  tarefas:  ['tarefa','fazer','pendente','completar','lista','deadline','prazo'],
  habitos:  ['hábito','meditar','água','exercício','rotina','streak','dormir'],
  financas: ['dinheiro','gasto','salário','pagar','saldo','economia','investir','conta'],
  metas:    ['meta','objetivo','plano','alcançar','progresso','prazo','sonho'],
};

let _memDB = null;

// ── Open IndexedDB ────────────────────────────
async function memOpen(){
  if(_memDB) return _memDB;
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(MEM_DB_NAME, MEM_DB_VER);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(MEM_STORE)){
        const store = db.createObjectStore(MEM_STORE,{keyPath:'id',autoIncrement:true});
        store.createIndex('timestamp','timestamp',{unique:false});
        store.createIndex('userId','userId',{unique:false});
      }
    };
    req.onsuccess = e=>{ _memDB=e.target.result; resolve(_memDB); };
    req.onerror   = e=>reject(e.target.error);
  });
}

// ── Auto-tag a message ────────────────────────
function autoTag(text){
  const t = text.toLowerCase();
  const tags = ['geral'];
  for(const [tag,kws] of Object.entries(TAG_KEYWORDS)){
    if(kws.some(k=>t.includes(k))) tags.push(tag);
  }
  return [...new Set(tags)];
}

// ── Save interaction ──────────────────────────
async function memSave(userMsg, nexusResp){
  if(!_currentUser||_currentUser.isGuest) return;
  try{
    const db = await memOpen();
    const tags = autoTag(userMsg+' '+nexusResp);
    const record = {
      userId:    _currentUser.id,
      timestamp: Date.now(),
      user_message:  userMsg,
      nexus_response: nexusResp.slice(0,800), // cap response size
      tags,
    };
    await new Promise((res,rej)=>{
      const tx = db.transaction(MEM_STORE,'readwrite');
      tx.objectStore(MEM_STORE).add(record);
      tx.oncomplete=res; tx.onerror=rej;
    });
    // Extract preferences asynchronously
    memExtractPrefs(userMsg, nexusResp);
    // Enforce limits
    await memEnforceLimits();
  }catch(e){ console.warn('NEXUS mem save:',e); }
}

// ── Load recent interactions for context ─────
async function memLoad(limit=60){
  if(!_currentUser||_currentUser.isGuest) return [];
  try{
    const db = await memOpen();
    const cutoff = Date.now() - MEM_RETENTION*24*60*60*1000;
    return new Promise((res,rej)=>{
      const tx = db.transaction(MEM_STORE,'readonly');
      const idx = tx.objectStore(MEM_STORE).index('userId');
      const results=[];
      idx.openCursor(IDBKeyRange.only(_currentUser.id),'prev').onsuccess = e=>{
        const cursor = e.target.result;
        if(cursor && results.length<limit){
          const r=cursor.value;
          if(r.timestamp>=cutoff) results.push(r);
          cursor.continue();
        } else res(results.reverse());
      };
      tx.onerror=rej;
    });
  }catch(e){ console.warn('NEXUS mem load:',e); return []; }
}

// ── Build memory context string for system prompt
async function memBuildContext(){
  try{
  const [interactions, prefs] = await Promise.all([memLoad(60), Promise.resolve(memLoadPrefs())]);
  if(!interactions.length && !prefs) return '';

  let ctx = '\n\n━━━ MEMÓRIA DE CONVERSAS ANTERIORES ━━━\n';

  // Summarized older interactions (>10)
  if(interactions.length > 10){
    const older = interactions.slice(0, interactions.length-10);
    const summary = older.map(i=>`[${new Date(i.timestamp).toLocaleDateString('pt-BR')} | ${i.tags.join('/')}] U: ${i.user_message.slice(0,80)} → N: ${i.nexus_response.slice(0,80)}`).join('\n');
    ctx += `\nResumo de ${older.length} interações anteriores:\n${summary}\n`;
  }

  // Recent interactions (last 10, full)
  const recent = interactions.slice(-10);
  if(recent.length){
    ctx += `\nÚltimas ${recent.length} interações:\n`;
    recent.forEach(i=>{
      ctx += `[${new Date(i.timestamp).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}] ${i.tags.map(t=>t.toUpperCase()).join('/')}\n`;
      ctx += `Usuário: ${i.user_message.slice(0,150)}\n`;
      ctx += `NEXUS: ${i.nexus_response.slice(0,150)}\n\n`;
    });
  }

  // Extracted preferences
  if(prefs){
    if(prefs.topics?.length)    ctx += `\nTópicos recorrentes: ${prefs.topics.join(', ')}`;
    if(prefs.people?.length)    ctx += `\nPessoas mencionadas: ${prefs.people.join(', ')}`;
    if(prefs.decisions?.length) ctx += `\nDecisões registradas: ${prefs.decisions.slice(-5).join(' | ')}`;
    ctx += '\n';
  }

  ctx += '━━━ FIM DA MEMÓRIA ━━━\n';
  ctx += 'Use o contexto acima para dar continuidade, lembrar preferências e evitar repetições.';
  return ctx;
  }catch(e){ console.warn('NEXUS memBuildContext error:',e); return ''; }
}

// ── Extract preferences from conversation ────
function memExtractPrefs(userMsg, nexusResp){
  const prefs = memLoadPrefs();
  const text  = (userMsg+' '+nexusResp).toLowerCase();

  // Detect recurring topics
  const topicKws = {academia:['academia','treino','musculação'],financas:['dinheiro','poupança','gasto','investimento'],trabalho:['trabalho','reunião','projeto','chefe','cliente'],saude:['saúde','médico','remédio','dormir'],estudos:['estudar','prova','faculdade','curso']};
  for(const [topic,kws] of Object.entries(topicKws)){
    if(kws.some(k=>text.includes(k)) && !prefs.topics.includes(topic)){
      prefs.topics.push(topic);
      if(prefs.topics.length>10) prefs.topics.shift();
    }
  }

  // Detect people names (simple heuristic: "com [Name]", "para [Name]")
  const nameMatches = userMsg.match(/(?:com|para|do|da|de)\s+([A-ZÀ-Ú][a-zà-ú]{2,})/g)||[];
  nameMatches.forEach(m=>{
    const name = m.split(' ').pop();
    if(name && !prefs.people.includes(name)){ prefs.people.push(name); if(prefs.people.length>20) prefs.people.shift(); }
  });

  // Detect decisions ("decidi","vou parar","escolhi","resolvi")
  const decisionKws = ['decidi','resolvi','escolhi','vou parar','vou começar','quero mudar','preciso'];
  if(decisionKws.some(k=>userMsg.toLowerCase().includes(k))){
    const snippet = userMsg.slice(0,100);
    if(!prefs.decisions.includes(snippet)){ prefs.decisions.push(snippet); if(prefs.decisions.length>30) prefs.decisions.shift(); }
  }

  memSavePrefs(prefs);
}

// ── Prefs via LocalStorage ────────────────────
function memLoadPrefs(){
  try{ return JSON.parse(localStorage.getItem(MEM_PREF_KEY+((_currentUser?.id)||''))||'{"topics":[],"people":[],"decisions":[]}'); }
  catch{ return {topics:[],people:[],decisions:[]}; }
}
function memSavePrefs(p){
  if(!_currentUser||_currentUser.isGuest) return;
  try{ localStorage.setItem(MEM_PREF_KEY+_currentUser.id, JSON.stringify(p)); }catch{}
}

// ── Enforce limits + compress ─────────────────
async function memEnforceLimits(){
  if(!_currentUser) return;
  try{
    const db = await memOpen();
    const all = await new Promise(res=>{
      const tx = db.transaction(MEM_STORE,'readonly');
      const req = tx.objectStore(MEM_STORE).index('userId').getAll(IDBKeyRange.only(_currentUser.id));
      req.onsuccess=e=>res(e.target.result);
    });
    // Remove expired
    const cutoff = Date.now()-MEM_RETENTION*24*60*60*1000;
    const expired = all.filter(r=>r.timestamp<cutoff);
    // Remove if over max
    const overLimit = all.length>MEM_MAX ? all.slice(0,all.length-MEM_MAX) : [];
    const toDelete = [...new Set([...expired.map(r=>r.id),...overLimit.map(r=>r.id)])];
    if(toDelete.length){
      const tx = db.transaction(MEM_STORE,'readwrite');
      const store = tx.objectStore(MEM_STORE);
      toDelete.forEach(id=>store.delete(id));
      await new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; });
    }
    // Compress oldest MEM_COMPRESS_AT if over 80% of max
    if(all.length > MEM_MAX*0.8 && all.length>=MEM_COMPRESS_AT){
      memCompressOldest(all.slice(0,MEM_COMPRESS_AT));
    }
  }catch(e){ console.warn('NEXUS mem enforce:',e); }
}

// ── Compress oldest interactions into summary ─
async function memCompressOldest(interactions){
  if(!interactions.length) return;
  // Build summary text
  const summary = '[RESUMO COMPRIMIDO] '+interactions.map(i=>`${new Date(i.timestamp).toLocaleDateString('pt-BR')}: ${i.user_message.slice(0,40)}→${i.nexus_response.slice(0,40)}`).join(' | ');
  // Delete originals and save summary as single record
  try{
    const db = await memOpen();
    const tx = db.transaction(MEM_STORE,'readwrite');
    const store = tx.objectStore(MEM_STORE);
    interactions.forEach(i=>store.delete(i.id));
    store.add({
      userId: _currentUser.id,
      timestamp: interactions[0].timestamp,
      user_message: summary,
      nexus_response: '[comprimido]',
      tags: ['geral','resumo'],
    });
    await new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; });
  }catch(e){ console.warn('NEXUS compress:',e); }
}

// ── Manual export (simple backup) ────────────
function exportData(){
  const prefs = memLoadPrefs();
  const d={profile:S.profile,tasks:S.tasks,habits:S.habits,events:S.events,goals:S.goals,txns:S.txns,dailyNote:S.dailyNote,prefs,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`nexus-backup-${todayStr()}.json`;a.click();
  URL.revokeObjectURL(url);toast('Backup exportado!');
}
