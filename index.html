function toggleFocus(){
  S.focus=!S.focus;
  document.getElementById('app').classList.toggle('focus',S.focus);
  document.getElementById('fexit').style.display=S.focus?'block':'none';
  document.getElementById('focus-btn').classList.toggle('on',S.focus);
  const ht=document.getElementById('hud-toggle');
  if(ht) ht.style.display=S.focus?'none':'flex';
  if(S.hudOpen&&S.focus){S.hudOpen=false;document.getElementById('hud-panel').classList.remove('open');}
  if(S.focus) toast('Modo foco — clique ✕ para sair');
  else computeAlerts();
}

function renderPINscreen(){
  const ps=document.getElementById('pin-screen');ps.classList.add('show');
  document.getElementById('app').style.pointerEvents='none';
  ps.style.pointerEvents='all';
  document.getElementById('pin-orb-txt').textContent=getInits(S.profile.name);
  renderPINdots();
  document.getElementById('pin-pad').innerHTML=[1,2,3,4,5,6,7,8,9,'','0','⌫'].map(k=>`<button class="pin-k ${k==='⌫'?'del':''}" style="${k===''?'visibility:hidden':''}" onclick="pinKey('${k}')">${k}</button>`).join('');
}
function renderPINdots(){document.getElementById('pin-dots').innerHTML=[0,1,2,3].map(i=>`<div class="pin-dot ${i<S.pinInput.length?(S.pinErr?'error':'filled'):''}"></div>`).join('');}
function pinKey(k){
  if(k==='⌫'){S.pinInput=S.pinInput.slice(0,-1);renderPINdots();return;}
  if(S.pinInput.length>=4) return;
  S.pinInput+=k; renderPINdots();
  if(S.pinInput.length===4){
    if(S.pinInput===S.privacy.pin){
      document.getElementById('pin-screen').classList.remove('show');
      document.getElementById('app').style.pointerEvents='';
      S.pinInput='';
    } else {
      S.pinErr=true;renderPINdots();
      setTimeout(()=>{S.pinErr=false;S.pinInput='';renderPINdots();},800);
    }
  }
}

const LS_USERS='nexus_users', LS_SESSION='nexus_session', LS_DATA_PFX='nexus_data_';
let _authTab='login', _remember=false, _currentUser=null, _saveTimer=null;

// ── Per-user data persistence ─────────────────
function saveUserData(){
  if(!_currentUser||_currentUser.isGuest) return;
  const data={tasks:S.tasks,habits:S.habits,events:S.events,goals:S.goals,txns:S.txns,dailyNote:S.dailyNote,profile:S.profile,savedAt:Date.now()};
  try{ localStorage.setItem(LS_DATA_PFX+_currentUser.id,JSON.stringify(data)); }catch(e){}
}
function applyUserData(uid){
  try{
    const raw=localStorage.getItem(LS_DATA_PFX+uid);
    if(!raw) return false;
    const d=JSON.parse(raw);
    if(d.tasks)   S.tasks=d.tasks;
    if(d.habits)  S.habits=d.habits;
    if(d.events)  S.events=d.events;
    if(d.goals)   S.goals=d.goals;
    if(d.txns)    S.txns=d.txns;
    if(d.dailyNote!==undefined) S.dailyNote=d.dailyNote;
    if(d.profile) S.profile={...S.profile,...d.profile};
    return true;
  }catch{ return false; }
}
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(saveUserData,500);
}
// ── Session validation ───────────────────────
function isSessionValid(session){
  if(!session) return false;
  if(!session.expiresAt) return true;
  return Date.now()<session.expiresAt;
}
function getUsers(){try{return JSON.parse(localStorage.getItem(LS_USERS)||'[]');}catch{return [];}}
function saveUsers(u){localStorage.setItem(LS_USERS,JSON.stringify(u));}
function getSession(){try{return JSON.parse(localStorage.getItem(LS_SESSION)||'null');}catch{return null;}}
function saveSession(u){localStorage.setItem(LS_SESSION,JSON.stringify(u));}
function clearSession(){localStorage.removeItem(LS_SESSION);}
function hashPwd(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(36);}
function getGreeting(){const h=new Date().getHours();return h<12?'BOM DIA':h<18?'BOA TARDE':'BOA NOITE';}
function getWelcomeMsg(name,isNew){
  const h=new Date().getHours();
  if(isNew) return 'Seu agente pessoal está pronto.';
  if(h<12) return 'Sua rotina matinal está pronta.';
  if(h<18) return 'Continue de onde parou.';
  return 'Sua rotina noturna aguarda.';
}

// Toggle password visibility
function togglePass(inputId, iconId){
  const inp  = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if(!inp) return;
  const isHidden = inp.type === 'password';
  inp.type  = isHidden ? 'text' : 'password';
  if(icon) icon.textContent = isHidden ? '🙈' : '👁';
}
function loadRecoverHint(email){
  const u = getUsers().find(x => x.email === email.trim());
  const qw=document.getElementById('hint-q-wrap');
  const aw=document.getElementById('hint-a-wrap');
  const np=document.getElementById('new-pass-wrap');
  if(!qw||!aw||!np) return;
  if(u&&u.hintQ){ qw.style.display='block'; qw.textContent='🔑 '+u.hintQ; aw.style.display='block'; np.style.display='block'; }
  else { qw.style.display='none'; aw.style.display='none'; np.style.display='none'; }
}
function toggleRemember(){_remember=!_remember;document.getElementById('remember-chk').classList.toggle('on',_remember);}
function showErr(msg){const el=document.getElementById('login-err');el.textContent=msg;el.classList.add('show');}

function handleAuth(){
  const tab=_authTab;
  if(tab==='login'){
    const email=(document.getElementById('f-email')||{}).value?.trim();
    const pass=(document.getElementById('f-pass')||{}).value;
    if(!email||!pass){showErr('Preencha e-mail e senha.');return;}
    const users=getUsers(),user=users.find(u=>u.email===email);
    if(!user){showErr('E-mail não encontrado. Crie uma conta.');return;}
    if(user.pwd!==hashPwd(pass)){showErr('Senha incorreta. Tente novamente.');return;}
    doLogin(user,false);
  } else if(tab==='register'){
    const name=(document.getElementById('f-name')||{}).value?.trim();
    const email=(document.getElementById('f-email')||{}).value?.trim();
    const pass=(document.getElementById('f-pass')||{}).value;
    const pass2=(document.getElementById('f-pass2')||{}).value;
    const hQ=(document.getElementById('f-hint-q')||{}).value?.trim();
    const hA=(document.getElementById('f-hint-a')||{}).value?.trim();
    if(!name||!email||!pass){showErr('Preencha nome, e-mail e senha.');return;}
    if(pass.length<6){showErr('Senha muito curta. Mínimo 6 caracteres.');return;}
    if(pass2 && pass!==pass2){showErr('As senhas não coincidem. Verifique.');return;}
    const users=getUsers();
    if(users.find(u=>u.email===email)){showErr('E-mail já cadastrado. Faça login.');return;}
    const nu={id:Date.now(),name,email,pwd:hashPwd(pass),hintQ:hQ||'',hintA:hA?hashPwd(hA.toLowerCase()):'',createdAt:new Date().toISOString()};
    users.push(nu);saveUsers(users);doLogin(nu,true);
  } else if(tab==='recover'){
    const email=(document.getElementById('f-email')||{}).value?.trim();
    const hA=(document.getElementById('f-hint-a')||{}).value?.trim();
    const np=(document.getElementById('f-newpass')||{}).value;
    if(!email){showErr('Informe seu e-mail.');return;}
    const users=getUsers(),idx=users.findIndex(u=>u.email===email);
    if(idx===-1){showErr('E-mail não encontrado.');return;}
    if(users[idx].hintA&&users[idx].hintA!==hashPwd(hA.toLowerCase())){showErr('Resposta incorreta.');return;}
    if(!np||np.length<6){showErr('Nova senha: mínimo 6 caracteres.');return;}
    users[idx].pwd=hashPwd(np);saveUsers(users);
    showErr('');toast('Senha atualizada! Faça login.');switchTab('login');
  }
}

function doLogin(user, isNew, isAuto){
  _currentUser=user;
  // Always save session (persistent by default)
  const sessionExpiry = user.sessionExpiry || null; // null = never
  const expiresAt = sessionExpiry ? Date.now() + sessionExpiry : null;
  saveSession({userId:user.id, email:user.email, name:user.name, loginTime:Date.now(), expiresAt});
  // Load saved user data
  const hadData = applyUserData(user.id);
  S.profile.name = user.name;
  // Show welcome screen (skip animation on auto-relogin)
  document.getElementById('login-backdrop').classList.add('hidden');
  if(!isAuto){
    const ws=document.getElementById('welcome-screen');
    ws.classList.remove('hidden');
    document.getElementById('welcome-av').textContent=getInits(user.name);
    document.getElementById('welcome-greeting').textContent=getGreeting();
    document.getElementById('welcome-name').textContent=user.name;
    document.getElementById('welcome-msg').textContent=getWelcomeMsg(user.name,isNew);
  }
  const delay = isAuto ? 0 : 2200;
  setTimeout(()=>{
    const ws=document.getElementById('welcome-screen');
    if(ws) ws.classList.add('hidden');
    document.getElementById('app').classList.remove('app-locked');
    updateHeaderUser();
    document.getElementById('st-pill').style.display='none';
    document.getElementById('user-menu').style.display='block';
    renderHUD(); computeAlerts(); S.msgs=[];
    const tp=S.tasks.length?Math.round(tdone()/S.tasks.length*100):0;
    const hp=S.habits.length?Math.round(hdone()/S.habits.length*100):0;
    const gr=getGreeting(); const grLow=gr.charAt(0)+gr.slice(1).toLowerCase();
    if(isAuto){
      // Quick relogin — short greeting only
      pushMsg({role:'nexus',tp:'n',
        text:`${grLow}, **${user.name}**. Bem-vindo de volta — sua rotina está pronta.`,
        card:{title:'RESUMO DO DIA',
          stats:[{val:`${tdone()}/${S.tasks.length}`,lbl:'Tarefas',cls:'hi'},{val:`${hdone()}/${S.habits.length}`,lbl:'Hábitos',cls:'ok'},{val:fmt(bal()),lbl:'Saldo',cls:overLim()?'wn':'hi'},{val:`${todEvts().length}`,lbl:'Hoje',cls:'hi'}],
          rows:[{label:'Tarefas',pct:tp,cls:tp>60?'g':''},{label:'Hábitos',pct:hp,cls:hp>60?'g':''}]}});
    } else {
      pushMsg({role:'nexus',tp:'n',
        text:`Sistema ativo. ${grLow}, **${user.name}**. ${isNew?'Conta criada com sucesso! ':''}${hadData?'Dados carregados.':'Sua rotina está pronta.'}`,
        card:{title:'RELATÓRIO DO DIA',
          stats:[{val:`${tdone()}/${S.tasks.length}`,lbl:'Tarefas',cls:'hi'},{val:`${hdone()}/${S.habits.length}`,lbl:'Hábitos',cls:'ok'},{val:fmt(bal()),lbl:'Saldo',cls:overLim()?'wn':'hi'},{val:`${S.events.length}`,lbl:'Eventos',cls:'hi'}],
          rows:[{label:'Tarefas',pct:tp,cls:tp>60?'g':''},{label:'Hábitos',pct:hp,cls:hp>60?'g':''},{label:S.goals[0]?.title?.slice(0,32)+'…'||'Meta',pct:pct(S.goals[0]||{sub:[]})},{label:'Meta economia',pct:Math.min(100,Math.round(Math.max(0,bal())/SAVINGS_GOAL*100)),cls:'g'}]}});
      pushMsg({role:'nexus',tp:'n',text:'Digite **/** para ver os comandos ou converse comigo diretamente.'});
    }
    // Init memory DB
    memOpen().catch(e=>console.warn('NEXUS mem init:',e));
    // Request notification permission
    requestNotifPermission();
    // Schedule daily reminders
    scheduleReminders();

  }, delay);
}

// Guest mode intercept
const _origSendMsg=sendMsg;
window.sendMsg=async function(){
  if(_currentUser&&_currentUser.isGuest){toast('Modo convidado — crie uma conta para interagir.');return;}
  return _origSendMsg();

// ═══════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════
function requestNotifPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    Notification.requestPermission().then(perm=>{
      if(perm==='granted') toast('Notificações ativadas ✔');
    });
  }
}
function showNotif(title, body, icon='./icon-192.png'){
  if(Notification.permission!=='granted') return;
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification(title,{body,icon,badge:'./icon-192.png',vibrate:[200,100,200]});
    });
  } else {
    new Notification(title,{body,icon});
  }
}
function scheduleReminders(){
  if(!_currentUser||_currentUser.isGuest) return;
  if(Notification.permission!=='granted') return;
  // Check habits not done — notify after 30s if any pending
  setTimeout(()=>{
    const pending=S.habits.filter(h=>!h.done);
    if(pending.length>0){
      showNotif('NEXUS — Hábitos pendentes',`Você tem ${pending.length} hábito${pending.length>1?'s':''} para completar hoje: ${pending[0].name}${pending.length>1?` e mais ${pending.length-1}`:'.'}`);
    }
  }, 30000);
  // Check overdue tasks — notify after 60s
  setTimeout(()=>{
    const overdue=S.tasks.filter(t=>!t.done&&t.date===todayStr()&&t.priority==='alta');
    if(overdue.length>0){
      showNotif('NEXUS — Tarefas urgentes',`${overdue.length} tarefa${overdue.length>1?'s':''} de alta prioridade pendente${overdue.length>1?'s':''} hoje.`);
    }
  }, 60000);
}

// ═══════════════════════════════════════════════
// SESSION EXPIRY HELPERS
// ═══════════════════════════════════════════════
const SESSION_OPTIONS=[
  {label:'Nunca',value:null},
  {label:'7 dias',value:7*24*60*60*1000},
  {label:'30 dias',value:30*24*60*60*1000},
  {label:'90 dias',value:90*24*60*60*1000},
];
function setSessionExpiry(ms){
  if(!_currentUser) return;
  _currentUser.sessionExpiry = ms;
  // Update saved session with new expiry
  const session=getSession();
  if(session){
    session.expiresAt = ms ? Date.now()+ms : null;
    saveSession(session);
  }
  // Update user record
  const users=getUsers();
  const idx=users.findIndex(u=>u.id===_currentUser.id);
  if(idx>=0){ users[idx].sessionExpiry=ms; saveUsers(users); }
  const opt=SESSION_OPTIONS.find(o=>o.value===ms);
  toast(`Sessão: ${opt?opt.label:'personalizada'}`);
  refreshPanel();
}
function getCurrentExpiry(){
  if(!_currentUser) return null;
  return _currentUser.sessionExpiry||null;
}

// ═══════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════
(function bootstrap(){
  document.getElementById('app').classList.add('app-locked');
  switchTab('login');
  const session=getSession();
  if(session && isSessionValid(session)){
    const users=getUsers();
    const user=users.find(u=>u.id===session.userId||u.email===session.email);
    if(user){ init(); doLogin(user,false,true); return; } // isAuto=true
  } else if(session && !isSessionValid(session)){
    clearSession(); // expired — clean up
  }
  init();
  // Listen for app visibility changes (PWA reopen)
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='visible'&&_currentUser&&!_currentUser.isGuest){
      renderHUD(); computeAlerts();
    }
  });
})();
